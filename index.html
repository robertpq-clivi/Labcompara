function StarRating({ rating }) {
  return (
    <div className="stars">
      {[1,2,3,4,5].map(i => {
        const filled = i <= Math.floor(rating);
        const half = !filled && i - 0.5 <= rating;
        return (
          <span key={i} style={{fontSize:'12px', color: (filled||half) ? '#F59E0B' : '#E2E8F0'}}>
            {filled ? '★' : half ? '½' : '★'}
          </span>
        );
      })}
    </div>
  );
}

// ─── BEAMS ANIMATION HOOK ─────────────────────────────────────────────────────
// Adapted from beams-background component — hues tuned to navy (#0B1F4B) + teal (#00B4D8)
function useBeamsCanvas(canvasRef) {
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;

    let beams = [];
    let rafId;

    function createBeam(w, h) {
      const angle = -35 + Math.random() * 10;
      // Hue range: 190–230 = teal-to-blue-navy spectrum
      return {
        x: Math.random() * w * 1.5 - w * 0.25,
        y: Math.random() * h * 1.5 - h * 0.25,
        width: 40 + Math.random() * 80,
        length: h * 2.5,
        angle,
        speed: 0.5 + Math.random() * 1.0,
        opacity: 0.10 + Math.random() * 0.18,
        hue: 190 + Math.random() * 40,   // teal (190) → blue (230)
        saturation: 70 + Math.random() * 20,
        lightness: 55 + Math.random() * 20,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: 0.018 + Math.random() * 0.025,
      };
    }

    function resetBeam(beam, index, total) {
      const col = index % 3;
      const spacing = canvas.width / 3;
      beam.y = canvas.height + 100;
      beam.x = col * spacing + spacing / 2 + (Math.random() - 0.5) * spacing * 0.5;
      beam.width = 80 + Math.random() * 120;
      beam.speed = 0.4 + Math.random() * 0.6;
      beam.hue = 190 + (index * 40) / total;
      beam.opacity = 0.12 + Math.random() * 0.14;
      return beam;
    }

    function drawBeam(beam) {
      ctx.save();
      ctx.translate(beam.x, beam.y);
      ctx.rotate((beam.angle * Math.PI) / 180);
      const po = beam.opacity * (0.8 + Math.sin(beam.pulse) * 0.2);
      const g = ctx.createLinearGradient(0, 0, 0, beam.length);
      const h = beam.hue, s = beam.saturation, l = beam.lightness;
      g.addColorStop(0,   `hsla(${h},${s}%,${l}%,0)`);
      g.addColorStop(0.1, `hsla(${h},${s}%,${l}%,${po * 0.5})`);
      g.addColorStop(0.4, `hsla(${h},${s}%,${l}%,${po})`);
      g.addColorStop(0.6, `hsla(${h},${s}%,${l}%,${po})`);
      g.addColorStop(0.9, `hsla(${h},${s}%,${l}%,${po * 0.5})`);
      g.addColorStop(1,   `hsla(${h},${s}%,${l}%,0)`);
      ctx.fillStyle = g;
      ctx.fillRect(-beam.width / 2, 0, beam.width, beam.length);
      ctx.restore();
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.parentElement.offsetWidth;
      const h = canvas.parentElement.offsetHeight;
      canvas.width  = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width  = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(dpr, dpr);
      beams = Array.from({ length: 28 }, () => createBeam(w, h));
    }

    function animate() {
      const w = canvas.width / (window.devicePixelRatio || 1);
      const h = canvas.height / (window.devicePixelRatio || 1);
      ctx.clearRect(0, 0, w, h);
      ctx.filter = 'blur(32px)';
      const total = beams.length;
      beams.forEach((beam, i) => {
        beam.y -= beam.speed;
        beam.pulse += beam.pulseSpeed;
        if (beam.y + beam.length < -100) resetBeam(beam, i, total);
        drawBeam(beam);
      });
      rafId = requestAnimationFrame(animate);
    }

    resize();
    window.addEventListener('resize', resize);
    animate();

    return () => {
      window.removeEventListener('resize', resize);
      cancelAnimationFrame(rafId);
    };
  }, []);
}

// ─── LEAD FORM ────────────────────────────────────────────────────────────────
function LeadForm({ onSubmit }) {
  const [form, setForm] = useState({ nombre:'', correo:'', sexo:'', edad:'', cp:'' });
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);

  const validate = () => {
    const e = {};
    if (!form.nombre.trim()) e.nombre = 'Tu nombre es necesario';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.correo)) e.correo = 'Ingresa un correo válido';
    if (!form.sexo) e.sexo = 'Selecciona una opción';
    if (!form.edad || form.edad < 1 || form.edad > 120) e.edad = 'Edad no válida';
    if (!form.cp || form.cp.length < 4) e.cp = 'Código postal requerido';
    return e;
  };

  const handleSubmit = async () => {
    const e = validate();
    setErrors(e);
    if (Object.keys(e).length) return;
    setLoading(true);
    await saveLead(form);   // ← persiste en Supabase
    setLoading(false);
    onSubmit(form);
  };

  const F = (key, value) => setForm(prev => ({...prev, [key]: value}));

  return (
    <section style={{padding:'80px 24px',background:'var(--gray-50)'}}>

        {/* Privacy reassurance */}
        <div style={{
          display:'flex',alignItems:'center',gap:'10px',

          <p style={{fontSize:'13px',color:'#065F46',lineHeight:1.5}}>
            <strong>Tu privacidad es lo primero.</strong> Solo usamos tus datos para enviarte la cotización. Nunca los vendemos.
          </p>
        </div>

        <div className="card" style={{padding:'32px'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'18px'}}>
            {/* Nombre */}
            <div className="input-group">
              <label className="input-label">Nombre completo *</label>

    const q = search.toLowerCase().trim();
    if (!q) return RAW_DATA.slice(0, 30);
    return RAW_DATA.filter(s => s.name.toLowerCase().includes(q));
  }, [search]);

  const toggle = (study) => {
    setSelected(prev =>
      prev.find(s=>s.name===study.name)

// ─── COMPARISON RESULTS ───────────────────────────────────────────────────────
function ComparisonResults({ studies, onDetail, onBack }) {
  const [sortBy, setSortBy] = useState('price');

  // Find best rated lab across all results
  const bestRatedLab = useMemo(() => {
    let best = null, bestR = 0;
    LABS.forEach(lab => {
      if (LAB_META[lab].rating > bestR) { bestR = LAB_META[lab].rating; best = lab; }
    });
    return best;
  }, []);

  // For each study, compute sorted lab options
  const studyResults = useMemo(() => {
    return studies.map(study => {
      const options = LABS.map(lab => ({
        lab,
        price: study[lab],
        rating: LAB_META[lab].rating,
        votes: LAB_META[lab].votes,
        meta: LAB_META[lab]
      })).filter(o => o.price);

      const minPrice = Math.min(...options.map(o=>o.price));
      const maxRating = Math.max(...options.map(o=>o.rating));

      options.forEach(o => {
        o.isCheapest = o.price === minPrice;
        o.isBestRated = o.rating === maxRating;
        o.isRecommended = o.isCheapest && o.isBestRated;
        o.savings = Math.round(((options.reduce((a,b)=>a+b.price,0)/options.length) - o.price));
      });

      const sorted = [...options].sort((a,b) =>
        sortBy==='price' ? a.price - b.price :
        sortBy==='rating' ? b.rating - a.rating :
        a.price - b.price
      );

      return { study, options: sorted, minPrice, avgPrice: study.avg };
    });
  }, [studies, sortBy]);

  return (
    <section style={{padding:'40px 24px 80px',background:'var(--gray-50)',minHeight:'60vh'}}>
      <div style={{maxWidth:'800px',margin:'0 auto'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:'16px',marginBottom:'28px',flexWrap:'wrap'}}>
          <button onClick={onBack} style={{background:'none',border:'2px solid var(--gray-200)',borderRadius:'10px',padding:'8px 14px',cursor:'pointer',fontSize:'14px',fontFamily:"'Sora',sans-serif",fontWeight:600,color:'var(--gray-600)',display:'flex',alignItems:'center',gap:'6px'}}>
            ← Volver
          </button>
          <div>
            <h2 style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:'22px',color:'var(--navy)'}}>
              Tu comparativa de precios
            </h2>
            <p style={{fontSize:'14px',color:'var(--gray-600)'}}>
              {studies.length} estudio{studies.length>1?'s':''} · Precios en pesos mexicanos
            </p>
          </div>
          {/* Sort */}
          <div style={{marginLeft:'auto',display:'flex',gap:'8px'}}>
            {[{v:'price',l:'Precio'},{v:'rating',l:'Calificación'}].map(s=>(
              <button key={s.v} onClick={()=>setSortBy(s.v)} style={{
                background:sortBy===s.v?'var(--navy)':'white',
                color:sortBy===s.v?'white':'var(--gray-600)',
                border:`2px solid ${sortBy===s.v?'var(--navy)':'var(--gray-200)'}`,
                borderRadius:'8px',padding:'6px 12px',cursor:'pointer',
                fontSize:'13px',fontWeight:600,fontFamily:"'Sora',sans-serif",transition:'all 0.2s'
              }}>
                {s.l}
              </button>
            ))}
          </div>
        </div>

        {/* Legend */}
        <div style={{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'24px'}}>
          <span className="badge-cheapest">💰 Más barato</span>
          <span className="badge-rated">⭐ Mejor calificado</span>
          <span className="badge-recommended">✅ Recomendado</span>
        </div>

        {/* Results per study */}
        {studyResults.map(({study,options,minPrice,avgPrice},si)=>{
          const maxSavings = avgPrice ? avgPrice - minPrice : 0;
          return (
            <div key={study.name} style={{marginBottom:'32px'}}>
              {/* Study header */}
              <div style={{
                background:'linear-gradient(135deg,var(--navy),var(--navy-mid))',
                borderRadius:'16px 16px 0 0',
                padding:'16px 20px',
                display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px'
              }}>
                <div>
                  <h3 style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:'16px',color:'white'}}>{study.name}</h3>
                  <p style={{fontSize:'13px',color:'rgba(255,255,255,0.6)'}}>
                    {options.length} laboratorio{options.length!==1?'s':''} disponibles
                  </p>
                </div>
                {maxSavings > 100 && (
                  <div style={{
                    background:'rgba(16,185,129,0.2)',border:'1px solid rgba(16,185,129,0.4)',
                    borderRadius:'8px',padding:'6px 12px',textAlign:'center'
                  }}>
                    <div style={{fontFamily:"'Sora',sans-serif",fontSize:'11px',color:'#6EE7B7',fontWeight:600}}>AHORRA HASTA</div>
                    <div style={{fontFamily:"'Sora',sans-serif",fontSize:'18px',fontWeight:800,color:'#34D399'}}>
                      {formatPrice(maxSavings)}
                    </div>
                  </div>

              </div>

              {/* Lab rows */}
              <div style={{background:'white',borderRadius:'0 0 16px 16px',border:'2px solid var(--gray-100)',borderTop:'none',overflow:'hidden'}}>
                {options.map((opt,oi)=>(

                        {opt.meta.emoji && <span>{opt.meta.emoji}</span>}
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:'4px',marginTop:'2px'}}>
                        <StarRating rating={opt.rating}/>
                        {/* TODO: Replace opt.rating with real rating from reviews API */}
                        <span style={{fontSize:'11px',color:'var(--gray-400)'}}>{opt.rating} ({opt.votes.toLocaleString()})</span>
                      </div>
                    </div>

                    {/* Badges */}
                    <div style={{flex:1,display:'flex',flexWrap:'wrap',gap:'4px'}}>
                      {opt.isRecommended && <span className="badge-recommended">✅ Recomendado</span>}
                      {!opt.isRecommended && opt.isCheapest && <span className="badge-cheapest">💰 Más barato</span>}
                      {!opt.isRecommended && opt.isBestRated && <span className="badge-rated">⭐ Mejor calificado</span>}
                    </div>

                    {/* Price */}
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div className="price-display" style={{color:opt.isCheapest?'#059669':'var(--navy)'}}>
                        {formatPrice(opt.price)}
                      </div>
                      {avgPrice && !opt.isCheapest && (
                        <div style={{fontSize:'11px',color:'var(--gray-400)'}}>
                          prom. {formatPrice(avgPrice)}
                        </div>
                      )}

                    {/* CTA */}
                    <button
                      onClick={()=>onDetail(study,opt.lab,opt)}

                      style={{padding:'10px 16px',fontSize:'13px',flexShrink:0}}

                  </div>
                )}
              </div>
            </div>
          );
        })}

        {/* Start over */}
        <div style={{textAlign:'center',marginTop:'16px'}}>
          <button onClick={onBack} style={{background:'none',border:'none',color:'var(--gray-400)',cursor:'pointer',fontSize:'14px',textDecoration:'underline'}}>
            Buscar otros estudios
          </button>
        </div>
      </div>
    </section>
  );
}

      <div className="modal-sheet">
        {/* Handle bar */}
        <div style={{width:40,height:4,background:'var(--gray-200)',borderRadius:2,margin:'0 auto 20px'}}/>

        {/* Lab badge */}
        <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px'}}>
          <div style={{
            width:48,height:48,borderRadius:14,
            background:`${meta.color}18`,
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:22
          }}>
            {meta.emoji}
          </div>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
              <h3 style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:'18px',color:'var(--navy)'}}>{lab}</h3>
              {opt.isCheapest && <span className="badge-cheapest">💰 Más barato</span>}
              {opt.isBestRated && <span className="badge-rated">⭐ Mejor calificado</span>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'4px',marginTop:'4px'}}>
              <StarRating rating={meta.rating}/>
              <span style={{fontSize:'12px',color:'var(--gray-400)'}}>{meta.rating}/5 · {meta.votes.toLocaleString()} reseñas</span>
            </div>
          </div>
          <button onClick={onClose} style={{
            width:32,height:32,borderRadius:'50%',border:'2px solid var(--gray-200)',
            background:'white',cursor:'pointer',fontSize:'16px',display:'flex',
            alignItems:'center',justifyContent:'center',flexShrink:0
          }}>×</button>
        </div>

        {/* Lab services */}
        <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'20px'}}>
          {meta.services.map((s,i)=>(
            <span key={i} style={{
              background:`${meta.color}12`,color:meta.color,
              borderRadius:'20px',padding:'4px 10px',fontSize:'12px',fontWeight:500
            }}>{s}</span>
          ))}
        </div>

        <div className="divider" style={{marginBottom:'20px'}}/>

        {/* Study info */}
        <h4 style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:'16px',color:'var(--navy)',marginBottom:'8px'}}>
          {study.name}
        </h4>
        <p style={{fontSize:'14px',color:'var(--gray-600)',lineHeight:1.7,marginBottom:'16px'}}>{info.desc}</p>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'20px'}}>
          {[
            {icon:'🎯',label:'Para qué sirve',val:info.purpose},
            {icon:'📋',label:'Preparación',val:info.prep},
            {icon:info.fasting?'⏰':'✅',label:'Ayuno',val:info.fasting?'Requerido (8-12h)':'No necesario'},
            {icon:'⚡',label:'Resultados',val:info.time}
          ].map((item,i)=>(
            <div key={i} style={{
              background:'var(--gray-50)',borderRadius:'12px',padding:'14px',
              gridColumn: i===0 ? '1/-1' : 'auto'
            }}>
              <div style={{fontSize:'18px',marginBottom:'6px'}}>{item.icon}</div>
              <div style={{fontSize:'11px',fontWeight:700,color:'var(--gray-400)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.05em'}}>{item.label}</div>
              <div style={{fontSize:'13px',color:'var(--gray-700)',lineHeight:1.5}}>{item.val}</div>
            </div>
          ))}
        </div>

        {/* Fasting alert */}
        {info.fasting && (
          <div style={{
            background:'rgba(245,158,11,0.1)',border:'1px solid rgba(245,158,11,0.3)',
            borderRadius:'10px',padding:'12px 16px',marginBottom:'20px',
            display:'flex',gap:'10px',alignItems:'flex-start'
          }}>
            <span style={{fontSize:'18px'}}>⚠️</span>
            <p style={{fontSize:'13px',color:'#92400E',lineHeight:1.5}}>
              <strong>Requiere ayuno.</strong> No comas ni bebas nada (excepto agua) por lo menos 8-12 horas antes de tu estudio.
            </p>
          </div>
        )}

        {/* Price + CTA */}
        <div style={{
          background:'linear-gradient(135deg,var(--navy),var(--navy-mid))',
          borderRadius:'16px',padding:'20px',
          display:'flex',alignItems:'center',justifyContent:'space-between',gap:'16px',flexWrap:'wrap'
        }}>
          <div>
            <div style={{fontSize:'12px',color:'rgba(255,255,255,0.6)',marginBottom:'4px'}}>Precio en {lab}</div>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:'28px',fontWeight:800,color:'white'}}>
              {formatPrice(study[lab])}
            </div>
          </div>
          <a
            href={meta.url}
            target="_blank"
            rel="noopener noreferrer"
            className="btn-primary"
            style={{textDecoration:'none',fontSize:'15px'}}
          >
            Ir al laboratorio →
          </a>
        </div>

        <p style={{textAlign:'center',fontSize:'11px',color:'var(--gray-400)',marginTop:'12px',lineHeight:1.6}}>
          Labcompara te redirige al sitio del laboratorio. El pago se realiza directamente con ellos.
        </p>
      </div>
    </div>
  );
}

// ─── FOOTER ───────────────────────────────────────────────────────────────────
function Footer() {
  return (
    <footer>
      <div style={{maxWidth:'900px',margin:'0 auto'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'40px',marginBottom:'40px'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px'}}>
              <span className="footer-brand">Labcompara</span>
            </div>
            <p style={{fontSize:'13px',color:'rgba(255,255,255,0.55)',lineHeight:1.7}}>
              Compara precios de estudios de laboratorio entre los mejores laboratorios de México.
            </p>
          </div>
          <div>
            <div style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:'13px',color:'rgba(255,255,255,0.7)',marginBottom:'16px',textTransform:'uppercase',letterSpacing:'0.08em'}}>Laboratorios</div>
            {LABS.map(l=>(
              <div key={l} style={{marginBottom:'8px'}}>
                <a href={LAB_META[l].url} target="_blank" rel="noopener noreferrer" className="footer-link">{l}</a>
              </div>
            ))}
          </div>
          <div>
            <div style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:'13px',color:'rgba(255,255,255,0.7)',marginBottom:'16px',textTransform:'uppercase',letterSpacing:'0.08em'}}>Legal</div>
            {['Aviso de privacidad','Términos de uso','Cookies','Contacto'].map(l=>(
              <div key={l} style={{marginBottom:'8px'}}>
                <a href="#" className="footer-link">{l}</a>
              </div>
            ))}
          </div>
        </div>
        <div className="footer-disclaimer">
          <strong style={{color:'rgba(255,255,255,0.6)'}}>Aviso importante:</strong> Labcompara es un comparador de precios de estudios de laboratorio. No somos un laboratorio clínico ni proveedor de servicios médicos. Los precios mostrados son referenciales y pueden variar. Labcompara redirige al usuario al sitio web del laboratorio para realizar su compra. No cobramos comisión al usuario. © 2024 Labcompara. Todos los derechos reservados.
        </div>
      </div>
    </footer>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  // Flow: 'landing' → 'form' → 'search' → 'results' → (modal)
  const [step, setStep] = useState('landing');
  const [lead, setLead] = useState(null);
  const [selectedStudies, setSelectedStudies] = useState([]);
  const [modal, setModal] = useState(null); // { study, lab, opt }

  const scrollToForm = () => {
    setStep('form');
    setTimeout(() => window.scrollTo({top:0,behavior:'smooth'}),50);
  };

  const handleFormSubmit = (formData) => {
    setLead(formData);
    setStep('search');
    setTimeout(() => window.scrollTo({top:0,behavior:'smooth'}),50);
  };

  const handleCompare = (studies) => {
    setSelectedStudies(studies);
    setStep('results');
    setTimeout(() => window.scrollTo({top:0,behavior:'smooth'}),50);
  };

  const handleDetail = (study, lab, opt) => {
    setModal({ study, lab, opt });
  };

  return (
    <div>
      <Nav onCTA={scrollToForm} onLogoClick={() => { setStep('landing'); window.scrollTo({top:0,behavior:'smooth'}); }}/>

      {step === 'landing' && (
        <>
          <Hero onCTA={scrollToForm}/>
          <HowItWorks onCTA={scrollToForm}/>
          <TrustSection/>
          {/* Inline teaser form call */}
          <section style={{padding:'60px 24px',background:'linear-gradient(135deg,var(--navy),#0e3060)',textAlign:'center'}}>
            <h2 style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:'clamp(24px,4vw,36px)',color:'white',marginBottom:'16px'}}>
              ¿Listo para cotizar?
            </h2>
            <p style={{color:'rgba(255,255,255,0.7)',marginBottom:'28px',fontSize:'16px'}}>
              En menos de 2 minutos tienes tu comparativa personalizada.
            </p>
            <button className="btn-primary" style={{fontSize:'17px',padding:'16px 40px'}} onClick={scrollToForm}>
              Cotizar ahora — es gratis →
            </button>
          </section>
        </>
      )}

      {step === 'form' && (
        <div style={{paddingTop:'80px'}}>
          <LeadForm onSubmit={handleFormSubmit}/>
        </div>
      )}

      {step === 'search' && (
        <div style={{paddingTop:'80px'}}>
          {lead && (
            <div style={{background:'linear-gradient(90deg,var(--navy),var(--navy-mid))',padding:'16px 24px',textAlign:'center'}}>
              <p style={{color:'white',fontSize:'14px'}}>
                ¡Hola <strong>{lead.nombre.split(' ')[0]}</strong>! Tu cotización se enviará a <strong>{lead.correo}</strong>
              </p>
            </div>
          )}
          <StudySearch onCompare={handleCompare}/>
        </div>
      )}

      {step === 'results' && (
        <div style={{paddingTop:'80px'}}>
          {lead && (
            <div style={{background:'linear-gradient(90deg,var(--navy),var(--navy-mid))',padding:'16px 24px',textAlign:'center'}}>
              <p style={{color:'white',fontSize:'14px'}}>
                ¡Hola <strong>{lead.nombre.split(' ')[0]}</strong>! Enviamos tu cotización a <strong>{lead.correo}</strong> ✓
              </p>
            </div>
          )}
          <ComparisonResults
            studies={selectedStudies}
            onDetail={handleDetail}
            onBack={() => setStep('search')}
          />
        </div>
      )}

      {/* Modal */}
      {modal && (
        <StudyDetailModal
          study={modal.study}
          lab={modal.lab}
          opt={modal.opt}
          onClose={()=>setModal(null)}
        />
      )}

      {/* Footer always visible on landing */}
      {step === 'landing' && <Footer/>}

      {/* Persistent back to landing on non-landing steps */}
      {step !== 'landing' && (
        <div style={{background:'var(--gray-50)',padding:'24px',textAlign:'center',borderTop:'1px solid var(--gray-100)'}}>
          <button
            onClick={() => setStep('landing')}
            style={{background:'none',border:'none',color:'var(--gray-400)',cursor:'pointer',fontSize:'13px',textDecoration:'underline'}}
          >
            ← Volver al inicio
          </button>
          <Footer/>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
